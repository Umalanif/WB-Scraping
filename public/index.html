<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WB Parser - Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-4xl">
        <h1 class="text-2xl font-bold text-center text-white mb-6">🎛️ WB Parser Control Panel</h1>

        <!-- Main Control Panel -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <!-- Miner Control -->
            <div class="bg-gray-800 rounded-lg shadow-lg p-5">
                <h2 class="text-lg font-semibold text-blue-400 mb-3">Miner (Session Update)</h2>
                <button id="btn-update-session" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition-colors">
                    Обновить сессию
                </button>
            </div>

            <!-- Prisma Studio Button -->
            <div class="bg-gray-800 rounded-lg shadow-lg p-5">
                <h2 class="text-lg font-semibold text-purple-400 mb-3">Database</h2>
                <button id="btn-prisma-studio" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-medium py-2 px-4 rounded-lg transition-colors flex items-center justify-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path>
                    </svg>
                    Открыть базу данных
                </button>
            </div>
        </div>

        <!-- Parser Control -->
        <div class="bg-gray-800 rounded-lg shadow-lg p-5 mb-4">
            <h2 class="text-lg font-semibold text-green-400 mb-3">Parser</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div>
                    <label for="search-query" class="block text-xs text-gray-400 mb-1">Search Query</label>
                    <input
                        type="text"
                        id="search-query"
                        value="товар"
                        class="w-full bg-gray-700 border border-gray-600 text-white rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
                        placeholder="Введите запрос"
                    />
                </div>
                <div>
                    <label for="limit" class="block text-xs text-gray-400 mb-1">Limit (products)</label>
                    <input
                        type="number"
                        id="limit"
                        value="100"
                        min="1"
                        max="10000"
                        class="w-full bg-gray-700 border border-gray-600 text-white rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
                    />
                </div>
                <div class="flex items-end">
                    <button id="btn-start-parser" class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg transition-colors">
                        Запустить парсинг
                    </button>
                </div>
            </div>
        </div>

        <!-- Status and Actions Row -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <!-- Status Panel -->
            <div class="bg-gray-800 rounded-lg shadow-lg p-5">
                <h2 class="text-lg font-semibold text-gray-300 mb-3">Status</h2>
                <div id="status-indicator" class="flex items-center">
                    <div class="w-3 h-3 bg-gray-500 rounded-full mr-2"></div>
                    <span id="status-text" class="text-gray-400">Idle</span>
                </div>
                <div id="status-details" class="mt-2 text-xs text-gray-500">
                    Ready to start
                </div>
            </div>

            <!-- Export Panel -->
            <div class="bg-gray-800 rounded-lg shadow-lg p-5">
                <h2 class="text-lg font-semibold text-gray-300 mb-3">Export</h2>
                <button id="btn-export-excel" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-medium py-2 px-4 rounded-lg transition-colors flex items-center justify-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    Скачать Excel
                </button>
            </div>
        </div>

        <!-- Log Viewer -->
        <div class="bg-gray-800 rounded-lg shadow-lg p-5">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-semibold text-gray-300">Log Viewer</h2>
                <button id="btn-clear-logs" class="text-gray-500 hover:text-gray-300 text-xs">
                    Очистить
                </button>
            </div>
            <div id="console-output" class="bg-black text-green-400 font-mono text-xs p-3 rounded-lg h-48 overflow-y-auto">
                <div class="text-gray-500">Ожидание логов...</div>
            </div>
        </div>
    </div>

    <script>
        // WB Parser Client-side Logic
        const POLLING_INTERVAL = 2000;
        const API_BASE = '';

        // DOM Elements
        const btnUpdateSession = document.getElementById('btn-update-session');
        const btnStartParser = document.getElementById('btn-start-parser');
        const btnExportExcel = document.getElementById('btn-export-excel');
        const btnPrismaStudio = document.getElementById('btn-prisma-studio');
        const btnClearLogs = document.getElementById('btn-clear-logs');
        const searchQueryInput = document.getElementById('search-query');
        const limitInput = document.getElementById('limit');
        const statusText = document.getElementById('status-text');
        const statusIndicator = document.getElementById('status-indicator');
        const statusDetails = document.getElementById('status-details');
        const consoleOutput = document.getElementById('console-output');

        // State
        let isPolling = false;
        let pollingIntervalId = null;
        let lastLogLineCount = 0;
        let lastKnownStatus = 'idle';

        /**
         * Update UI state based on process status
         */
        function setUIState(status) {
            const isRunning = status === 'running';
            btnUpdateSession.disabled = isRunning;
            btnStartParser.disabled = isRunning;
            btnExportExcel.disabled = isRunning;

            [btnUpdateSession, btnStartParser, btnExportExcel].forEach(btn => {
                if (isRunning) {
                    btn.classList.add('opacity-50', 'cursor-not-allowed');
                } else {
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            });
        }

        /**
         * Update status indicator in the UI
         */
        function updateStatusIndicator(data) {
            const indicatorDot = statusIndicator.querySelector('div');

            if (data.status === 'running') {
                indicatorDot.className = 'w-3 h-3 bg-green-500 rounded-full mr-2 animate-pulse';
                statusText.textContent = `Running: ${data.job === 'miner' ? 'Miner' : 'Parser'}`;
                statusText.className = 'text-green-400 font-medium';

                const startTime = data.startTime ? new Date(data.startTime).toLocaleTimeString('ru-RU') : 'N/A';
                statusDetails.innerHTML = `<div>PID: ${data.pid || 'N/A'}</div><div>Started: ${startTime}</div>`;
            } else {
                indicatorDot.className = 'w-3 h-3 bg-gray-500 rounded-full mr-2';
                statusText.textContent = 'Idle';
                statusText.className = 'text-gray-400';
                statusDetails.innerHTML = 'Ready to start';
            }

            lastKnownStatus = data.status;
            setUIState(data.status);
        }

        /**
         * Fetch and update status from server
         */
        async function fetchStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/status`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                updateStatusIndicator(data);
                return data;
            } catch (error) {
                console.error('Failed to fetch status:', error);
                return null;
            }
        }

        /**
         * Start polling status
         */
        function startPolling() {
            if (isPolling) return;
            isPolling = true;
            fetchStatus();
            pollingIntervalId = setInterval(fetchStatus, POLLING_INTERVAL);
        }

        /**
         * Fetch logs from server and update console
         */
        async function fetchLogs() {
            try {
                const response = await fetch(`${API_BASE}/api/logs`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                if (data.error) {
                    consoleOutput.innerHTML = `<div class="text-red-400">Error: ${escapeHtml(data.error)}</div>`;
                    return;
                }

                if (!data.lines || data.lines.length === 0) {
                    if (lastLogLineCount === 0) {
                        consoleOutput.innerHTML = '<div class="text-gray-500">Ожидание логов...</div>';
                    }
                    return;
                }

                if (data.lines.length !== lastLogLineCount) {
                    renderConsoleLogs(data.lines);
                    lastLogLineCount = data.lines.length;
                }
            } catch (error) {
                console.error('Failed to fetch logs:', error);
            }
        }

        /**
         * Render console logs
         */
        function renderConsoleLogs(lines) {
            if (lines.length === 0) {
                consoleOutput.innerHTML = '<div class="text-gray-500">Ожидание логов...</div>';
                return;
            }

            consoleOutput.innerHTML = lines.map(line => {
                let displayLine = escapeHtml(line);
                let colorClass = 'text-green-400';

                try {
                    const parsed = JSON.parse(line);
                    const level = parsed.level;
                    const msg = parsed.msg || '';
                    const time = parsed.time ? new Date(parsed.time).toLocaleTimeString('ru-RU') : '';

                    if (level >= 50) colorClass = 'text-red-400 font-bold';
                    else if (level >= 40) colorClass = 'text-yellow-400';
                    else if (level >= 30) colorClass = 'text-green-400';
                    else colorClass = 'text-gray-400';

                    if (msg.includes('429') || line.includes('429')) {
                        colorClass = 'text-red-500 font-bold bg-red-900/30';
                    }

                    displayLine = `[${time}] ${parsed.level ? getLevelName(level) : ''} ${escapeHtml(msg)}`;
                } catch (e) {
                    // Not JSON, display as-is
                }

                return `<div class="${colorClass} whitespace-pre-wrap break-words">${displayLine}</div>`;
            }).join('');

            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        /**
         * Get log level name from number
         */
        function getLevelName(level) {
            if (level >= 60) return 'FATAL';
            if (level >= 50) return 'ERROR';
            if (level >= 40) return 'WARN';
            if (level >= 30) return 'INFO';
            if (level >= 20) return 'DEBUG';
            return 'TRACE';
        }

        /**
         * Escape HTML to prevent XSS
         */
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        /**
         * Export to Excel
         */
        function exportToExcel() {
            window.location.href = `${API_BASE}/api/export/excel`;
        }

        /**
         * Open Prisma Studio
         */
        async function openPrismaStudio() {
            btnPrismaStudio.textContent = 'Launching...';
            btnPrismaStudio.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/prisma/studio`, { method: 'POST' });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Failed to launch Prisma Studio');
                }
                
                // Open Prisma Studio in new tab
                window.open('http://localhost:5555', '_blank');
                
                btnPrismaStudio.innerHTML = `
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path>
                    </svg>
                    ✓ Открыто
                `;
                setTimeout(() => {
                    btnPrismaStudio.innerHTML = `
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path>
                        </svg>
                        Открыть базу данных
                    `;
                    btnPrismaStudio.disabled = false;
                }, 2000);
            } catch (error) {
                console.error('Failed to launch Prisma Studio:', error);
                alert(`Error: ${error.message}`);
                btnPrismaStudio.disabled = false;
                btnPrismaStudio.innerHTML = `
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path>
                    </svg>
                    Открыть базу данных
                `;
            }
        }

        // Event Handlers
        btnUpdateSession.addEventListener('click', async () => {
            if (btnUpdateSession.disabled) return;

            btnUpdateSession.textContent = 'Updating...';
            btnUpdateSession.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/miner/start`, { method: 'POST' });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Failed to start miner');
                }
                console.log('Miner started');
                startPolling();
            } catch (error) {
                console.error('Failed to start miner:', error);
                alert(`Error: ${error.message}`);
            } finally {
                btnUpdateSession.textContent = 'Обновить сессию';
            }
        });

        btnStartParser.addEventListener('click', async () => {
            if (btnStartParser.disabled) return;

            const query = searchQueryInput.value.trim();
            const limit = parseInt(limitInput.value, 10) || 100;

            if (!query) {
                alert('Please enter a search query');
                return;
            }

            btnStartParser.textContent = 'Starting...';
            btnStartParser.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/parser/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, limit }),
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Failed to start parser');
                }

                console.log('Parser started');
                startPolling();
            } catch (error) {
                console.error('Failed to start parser:', error);
                alert(`Error: ${error.message}`);
            } finally {
                btnStartParser.textContent = 'Запустить парсинг';
            }
        });

        btnExportExcel.addEventListener('click', () => {
            if (btnExportExcel.disabled) return;
            exportToExcel();
        });

        btnPrismaStudio.addEventListener('click', openPrismaStudio);

        btnClearLogs.addEventListener('click', () => {
            consoleOutput.innerHTML = '<div class="text-gray-500">Консоль очищена</div>';
            lastLogLineCount = 0;
        });

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            console.log('WB Parser UI initialized');
            startPolling();
            const logPollingIntervalId = setInterval(fetchLogs, 2000);
            fetchLogs();
        });
    </script>
</body>
</html>
