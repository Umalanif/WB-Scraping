<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WB Parser - Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">Wildberries Parser Control Panel</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Control Panel -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">Управление</h2>
                    
                    <!-- Update Session Button -->
                    <button id="btn-update-session" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg mb-4 transition-colors">
                        Обновить сессию
                    </button>

                    <!-- Parser Controls -->
                    <div class="space-y-4">
                        <div>
                            <label for="search-query" class="block text-sm font-medium text-gray-700 mb-1">Search Query</label>
                            <input 
                                type="text" 
                                id="search-query" 
                                value="товар"
                                class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Введите запрос"
                            />
                        </div>
                        
                        <div>
                            <label for="max-pages" class="block text-sm font-medium text-gray-700 mb-1">Max Pages</label>
                            <input 
                                type="number" 
                                id="max-pages" 
                                value="100"
                                min="1"
                                max="1000"
                                class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            />
                        </div>

                        <button id="btn-start-parser" class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg transition-colors">
                            Запустить парсинг
                        </button>
                    </div>
                </div>

                <!-- Status Panel -->
                <div class="bg-white rounded-lg shadow-md p-6 mt-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">Статус</h2>
                    <div id="status-indicator" class="flex items-center justify-center">
                        <div class="w-3 h-3 bg-gray-400 rounded-full mr-2"></div>
                        <span id="status-text" class="text-gray-600">Idle</span>
                    </div>
                    <div id="status-details" class="mt-3 text-sm text-gray-500 text-center">
                        <!-- Process details will appear here -->
                    </div>
                </div>
            </div>

            <!-- Results Panel -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">Результаты</h2>
                        <button id="btn-export-excel" class="bg-purple-600 hover:bg-purple-700 text-white font-medium py-2 px-4 rounded-lg transition-colors flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                            </svg>
                            Скачать Excel
                        </button>
                    </div>

                    <!-- Products Table -->
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Артикул</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Название</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Цена</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Бренд</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Рейтинг</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Изображение</th>
                                </tr>
                            </thead>
                            <tbody id="products-table-body" class="bg-white divide-y divide-gray-200">
                                <tr>
                                    <td colspan="6" class="px-4 py-8 text-center text-gray-500">
                                        Нет данных. Запустите парсинг для получения результатов.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Refresh Button -->
                    <div class="mt-4 text-center">
                        <button id="btn-refresh-products" class="text-blue-600 hover:text-blue-800 text-sm font-medium">
                            Обновить таблицу
                        </button>
                    </div>
                </div>

                <!-- Console Panel -->
                <div class="bg-white rounded-lg shadow-md p-6 mt-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">Консоль</h2>
                        <button id="btn-clear-logs" class="text-gray-500 hover:text-gray-700 text-sm">
                            Очистить
                        </button>
                    </div>
                    <div id="console-output" class="bg-black text-green-400 font-mono text-sm p-4 rounded-lg h-64 overflow-y-auto">
                        <div class="text-gray-500">Ожидание логов...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // WB Parser Client-side Logic
        // Configuration
        const POLLING_INTERVAL = 2000; // 2 seconds
        const API_BASE = '';

        // DOM Elements
        const btnUpdateSession = document.getElementById('btn-update-session');
        const btnStartParser = document.getElementById('btn-start-parser');
        const btnExportExcel = document.getElementById('btn-export-excel');
        const btnRefreshProducts = document.getElementById('btn-refresh-products');
        const btnClearLogs = document.getElementById('btn-clear-logs');
        const searchQueryInput = document.getElementById('search-query');
        const maxPagesInput = document.getElementById('max-pages');
        const statusText = document.getElementById('status-text');
        const statusIndicator = document.getElementById('status-indicator');
        const statusDetails = document.getElementById('status-details');
        const productsTableBody = document.getElementById('products-table-body');
        const consoleOutput = document.getElementById('console-output');

        // State
        let isPolling = false;
        let pollingIntervalId = null;
        let lastLogLineCount = 0;
        let lastKnownStatus = 'idle'; // Track status changes

        /**
         * Update UI state based on process status
         * @param {'idle' | 'running'} status
         */
        function setUIState(status) {
            const isRunning = status === 'running';
            
            // Disable/enable buttons
            btnUpdateSession.disabled = isRunning;
            btnStartParser.disabled = isRunning;
            btnExportExcel.disabled = isRunning;
            
            // Visual feedback on buttons
            const buttons = [btnUpdateSession, btnStartParser, btnExportExcel];
            buttons.forEach(btn => {
                if (isRunning) {
                    btn.classList.add('opacity-50', 'cursor-not-allowed');
                } else {
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            });
        }

        /**
         * Update status indicator in the UI
         * @param {{ status: string, job: string|null, pid: number|null, startTime: string|null }} data
         */
        function updateStatusIndicator(data) {
            const indicatorDot = statusIndicator.querySelector('div');
            const previousStatus = lastKnownStatus;

            if (data.status === 'running') {
                // Running state - green pulsing dot
                indicatorDot.className = 'w-3 h-3 bg-green-500 rounded-full mr-2 animate-pulse';
                statusText.textContent = `Running: ${data.job === 'miner' ? 'Miner' : 'Parser'}`;
                statusText.className = 'text-green-600 font-medium';

                // Show process details
                const startTime = data.startTime ? new Date(data.startTime).toLocaleTimeString('ru-RU') : 'N/A';
                statusDetails.innerHTML = `
                    <div>PID: ${data.pid || 'N/A'}</div>
                    <div>Started: ${startTime}</div>
                `;
            } else {
                // Idle state - gray dot
                indicatorDot.className = 'w-3 h-3 bg-gray-400 rounded-full mr-2';
                statusText.textContent = 'Idle';
                statusText.className = 'text-gray-600';
                statusDetails.innerHTML = '<div>Ready to start</div>';
            }

            // Update last known status and detect transition
            lastKnownStatus = data.status;
            
            // Auto-refresh products when parser completes (transition from running to idle)
            if (previousStatus === 'running' && data.status === 'idle') {
                console.log('Parser completed, auto-refreshing products...');
                setTimeout(() => loadProducts(), 500); // Small delay to ensure DB is updated
            }
            
            setUIState(data.status);
        }

        /**
         * Fetch and update status from server
         */
        async function fetchStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/status`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                updateStatusIndicator(data);
                return data;
            } catch (error) {
                console.error('Failed to fetch status:', error);
                return null;
            }
        }

        /**
         * Start polling status
         */
        function startPolling() {
            if (isPolling) return;
            
            isPolling = true;
            
            // Initial fetch
            fetchStatus();
            
            // Then poll at interval
            pollingIntervalId = setInterval(fetchStatus, POLLING_INTERVAL);
        }

        /**
         * Stop polling status
         */
        function stopPolling() {
            if (!isPolling) return;
            
            isPolling = false;
            if (pollingIntervalId) {
                clearInterval(pollingIntervalId);
                pollingIntervalId = null;
            }
        }

        /**
         * Load products from API and render table
         */
        async function loadProducts() {
            try {
                // Add cache-busting timestamp to prevent browser caching
                const timestamp = Date.now();
                const response = await fetch(`${API_BASE}/api/products/recent?t=${timestamp}`, {
                    cache: 'no-store',
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                        'Expires': '0',
                    },
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const products = await response.json();

                console.log(`[${new Date(timestamp).toISOString()}] Loaded ${products.length} products from API`);
                
                // Log first product's updatedAt to verify fresh data
                if (products.length > 0) {
                    console.log('First product updatedAt:', products[0].updatedAt);
                }
                
                renderProductsTable(products);
                
                // Visual feedback that refresh completed
                btnRefreshProducts.textContent = '✓ Обновлено';
                setTimeout(() => {
                    btnRefreshProducts.textContent = 'Обновить таблицу';
                }, 2000);
            } catch (error) {
                console.error('Failed to load products:', error);
                productsTableBody.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-4 py-8 text-center text-red-500">
                            Failed to load products: ${error.message}
                        </td>
                    </tr>
                `;
            }
        }

        /**
         * Render products table
         * @param {Array} products
         */
        function renderProductsTable(products) {
            if (!products || products.length === 0) {
                productsTableBody.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-4 py-8 text-center text-gray-500">
                            Нет данных. Запустите парсинг для получения результатов.
                        </td>
                    </tr>
                `;
                return;
            }

            productsTableBody.innerHTML = products.map(product => `
                <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 text-sm font-medium text-gray-900">${escapeHtml(product.id)}</td>
                    <td class="px-4 py-3 text-sm text-gray-700 max-w-xs truncate" title="${escapeHtml(product.name)}">${escapeHtml(product.name)}</td>
                    <td class="px-4 py-3 text-sm text-gray-700">${product.price !== null ? `${product.price.toFixed(2)} ₽` : ''}</td>
                    <td class="px-4 py-3 text-sm text-gray-700">${escapeHtml(product.brand || '')}</td>
                    <td class="px-4 py-3 text-sm text-gray-700">${product.rating !== null ? product.rating.toFixed(1) : ''}</td>
                    <td class="px-4 py-3 text-sm">
                        ${product.image ? `
                            <a href="${escapeHtml(product.image)}" target="_blank" class="text-blue-600 hover:text-blue-800">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                </svg>
                            </a>
                        ` : '<span class="text-gray-400">-</span>'}
                    </td>
                </tr>
            `).join('');
        }

        /**
         * Fetch logs from server and update console
         */
        async function fetchLogs() {
            try {
                const response = await fetch(`${API_BASE}/api/logs`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                if (data.error) {
                    consoleOutput.innerHTML = `<div class="text-red-400">Error: ${escapeHtml(data.error)}</div>`;
                    return;
                }

                if (!data.lines || data.lines.length === 0) {
                    if (lastLogLineCount === 0) {
                        consoleOutput.innerHTML = '<div class="text-gray-500">Ожидание логов...</div>';
                    }
                    return;
                }

                // Only update if there are new lines
                if (data.lines.length !== lastLogLineCount) {
                    renderConsoleLogs(data.lines);
                    lastLogLineCount = data.lines.length;
                }
            } catch (error) {
                console.error('Failed to fetch logs:', error);
                // Don't show error in console to avoid spam, just log to browser console
            }
        }

        /**
         * Render console logs
         * @param {Array<string>} lines
         */
        function renderConsoleLogs(lines) {
            if (lines.length === 0) {
                consoleOutput.innerHTML = '<div class="text-gray-500">Ожидание логов...</div>';
                return;
            }

            consoleOutput.innerHTML = lines.map(line => {
                // Parse JSON log lines for better formatting
                let displayLine = escapeHtml(line);
                let colorClass = 'text-green-400';

                try {
                    const parsed = JSON.parse(line);
                    const level = parsed.level;
                    const msg = parsed.msg || '';
                    const time = parsed.time ? new Date(parsed.time).toLocaleTimeString('ru-RU') : '';
                    
                    // Color by level
                    if (level >= 50) colorClass = 'text-red-400 font-bold'; // fatal/error
                    else if (level >= 40) colorClass = 'text-yellow-400'; // warn
                    else if (level >= 30) colorClass = 'text-green-400'; // info
                    else colorClass = 'text-gray-400'; // debug/trace

                    // Highlight 429 errors
                    if (msg.includes('429') || line.includes('429')) {
                        colorClass = 'text-red-500 font-bold bg-red-900/30';
                    }

                    displayLine = `[${time}] ${parsed.level ? getLevelName(level) : ''} ${escapeHtml(msg)}`;
                } catch (e) {
                    // Not JSON, display as-is
                }

                return `<div class="${colorClass} whitespace-pre-wrap break-words">${displayLine}</div>`;
            }).join('');

            // Auto-scroll to bottom
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        /**
         * Get log level name from number
         * @param {number} level
         * @returns {string}
         */
        function getLevelName(level) {
            if (level >= 60) return 'FATAL';
            if (level >= 50) return 'ERROR';
            if (level >= 40) return 'WARN';
            if (level >= 30) return 'INFO';
            if (level >= 20) return 'DEBUG';
            return 'TRACE';
        }

        /**
         * Escape HTML to prevent XSS
         * @param {string} str
         * @returns {string}
         */
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        /**
         * Export to Excel - opens download in new tab
         */
        function exportToExcel() {
            window.location.href = `${API_BASE}/api/export/excel`;
        }

        // Event Handlers

        /**
         * Handle Update Session button click
         */
        btnUpdateSession.addEventListener('click', async () => {
            if (btnUpdateSession.disabled) return;
            
            btnUpdateSession.textContent = 'Updating...';
            btnUpdateSession.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/api/miner/start`, { method: 'POST' });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Failed to start miner');
                }
                const result = await response.json();
                console.log('Miner started:', result);
                
                // Start polling to track status
                startPolling();
            } catch (error) {
                console.error('Failed to start miner:', error);
                alert(`Error: ${error.message}`);
            } finally {
                btnUpdateSession.textContent = 'Обновить сессию';
                // Button will be re-enabled by setUIState based on status
            }
        });

        /**
         * Handle Start Parser button click
         */
        btnStartParser.addEventListener('click', async () => {
            if (btnStartParser.disabled) return;
            
            const query = searchQueryInput.value.trim();
            const limit = parseInt(maxPagesInput.value, 10) || 100;
            
            if (!query) {
                alert('Please enter a search query');
                return;
            }
            
            btnStartParser.textContent = 'Starting...';
            btnStartParser.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/api/parser/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, limit }),
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Failed to start parser');
                }
                
                const result = await response.json();
                console.log('Parser started:', result);
                
                // Start polling to track status
                startPolling();
                
                // Refresh products table after parser completes (will be detected by polling)
            } catch (error) {
                console.error('Failed to start parser:', error);
                alert(`Error: ${error.message}`);
            } finally {
                btnStartParser.textContent = 'Запустить парсинг';
                // Button will be re-enabled by setUIState based on status
            }
        });

        /**
         * Handle Export Excel button click
         */
        btnExportExcel.addEventListener('click', () => {
            if (btnExportExcel.disabled) return;
            exportToExcel();
        });

        /**
         * Handle Refresh Products button click
         */
        btnRefreshProducts.addEventListener('click', async () => {
            // Show loading state
            const originalText = btnRefreshProducts.textContent;
            btnRefreshProducts.textContent = 'Обновление...';
            btnRefreshProducts.disabled = true;
            
            try {
                await loadProducts();
            } finally {
                btnRefreshProducts.textContent = originalText;
                btnRefreshProducts.disabled = false;
            }
        });

        /**
         * Handle Clear Logs button click
         */
        btnClearLogs.addEventListener('click', () => {
            consoleOutput.innerHTML = '<div class="text-gray-500">Консоль очищена</div>';
            lastLogLineCount = 0;
        });

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            console.log('WB Parser UI initialized');

            // Start status polling
            startPolling();

            // Start log polling (every 2 seconds)
            const logPollingIntervalId = setInterval(fetchLogs, 2000);
            // Initial fetch
            fetchLogs();

            // Load initial products
            loadProducts();
        });
    </script>
</body>
</html>
